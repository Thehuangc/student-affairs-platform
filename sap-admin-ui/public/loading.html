<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加载中...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1f16,#2d3428);font-family:'Georgia','Noto Serif SC',serif;overflow:hidden}
.card{text-align:center;padding:60px 80px;background:rgba(250,250,247,.95);border-radius:24px;box-shadow:0 40px 100px rgba(0,0,0,.5);animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.spinner{width:48px;height:48px;margin:0 auto 24px;border:4px solid #e8e4dc;border-top-color:#2a6b5e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h2{color:#1a1f16;font-size:20px;margin-bottom:8px}
p{color:#6b7560;font-size:14px;margin-bottom:20px}
.bar{width:240px;height:4px;background:#e8e4dc;border-radius:2px;margin:0 auto;overflow:hidden}
.bar-inner{height:100%;width:0;background:linear-gradient(90deg,#2a6b5e,#3d8b7a);border-radius:2px;transition:width .3s}
.steps{display:flex;justify-content:center;gap:8px;margin-top:20px}
.step{width:8px;height:8px;border-radius:50%;background:#e8e4dc;transition:all .3s}
.step.active{background:#2a6b5e;transform:scale(1.3)}
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h2>正在加载后台</h2>
  <p id="status">请稍候...</p>
  <div class="bar"><div class="bar-inner" id="progress"></div></div>
  <div class="steps" id="steps">
    <div class="step" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>
</div>
<div id="app" style="display:none"></div>
<script>
const token=localStorage.getItem('token');
if(!token)window.location.href='/login.html';

const status=document.getElementById('status');
const progress=document.getElementById('progress');
const step=(n,t)=>{progress.style.width=n+'%';status.textContent=t;document.querySelectorAll('.step').forEach((e,i)=>{e.classList.toggle('active',i<=(n/33|0))})};

step(10,'准备加载...');
step(20,'加载框架组件...');
Promise.all([
  import('/assets/vendor-CkiYGUy6.js').then(()=>{step(40,'框架加载完成')}),
  import('/assets/element-plus-B7yq-ps-.js').then(()=>{step(70,'UI组件加载完成')})
]).then(()=>{
  step(85,'启动应用...');
  return import('/assets/index-BmZd9HdY.js');
}).then(()=>{
  step(100,'加载完成!');
  document.getElementById('app').style.display='block';
  document.querySelector('.card').style.display='none';
}).catch(e=>{
  status.textContent='加载失败，请刷新重试';
  status.style.color='#c43a31';
  console.error(e);
});
</script>
</body>
</html>
