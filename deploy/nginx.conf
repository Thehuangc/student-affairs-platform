# service.huangc.cn Nginx配置
# 文件位置: /etc/nginx/sites-available/service.huangc.cn

server {
    listen 80;
    listen [::]:80;
    server_name service.huangc.cn;

    # 强制HTTPS（可选，如果您有SSL证书）
    # return 301 https://$server_name$request_uri;

    # 前端静态文件
    root /var/www/service.huangc.cn/dist;
    index index.html;

    # 日志配置
    access_log /var/log/nginx/service.huangc.cn.access.log;
    error_log /var/log/nginx/service.huangc.cn.error.log;

    # 前端路由 - Vue Router History模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API代理 - 转发到Spring Boot后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持（如果需要实时通知）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

# HTTPS配置（如果您有SSL证书，取消注释以下内容）
