version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: sap-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    networks:
      - sap-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: sap-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - sap-network

  # Nacos注册中心/配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: sap-nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 512m
      JVM_XMX: 512m
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - sap-network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: sap-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sap-network

volumes:
  mysql_data:
  redis_data:
  nacos_data:
  minio_data:

networks:
  sap-network:
    driver: bridge
